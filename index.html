<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolAI Agent • Free for Solana Devs</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-black text-white min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-2">SolAI Agent</h1>
      <p class="text-emerald-400 text-2xl">Your free AI co-founder for Solana tokens</p>
      <p class="text-zinc-400 mt-2">Pump.fun • Raydium • Anchor • Marketing • Zero cost</p>
    </div>

    <div id="chat" class="bg-zinc-900 rounded-3xl border border-zinc-800 h-[520px] flex flex-col overflow-hidden">
      <div class="bg-zinc-950 px-5 py-4 border-b border-zinc-800 flex items-center gap-3">
        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
        <p class="font-medium">SolAI is online • Ready to help you launch</p>
      </div>

      <div id="messages" class="flex-1 p-5 overflow-y-auto space-y-6"></div>

      <div class="p-4 border-t border-zinc-800">
        <form id="form" class="flex gap-2">
          <input id="input" type="text" 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-emerald-400 text-white placeholder-zinc-400"
                 placeholder="Ask anything about your Solana token...">
          <button type="submit"
                  class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-2xl font-medium">Send</button>
        </form>
      </div>
    </div>

    <div class="mt-6 flex flex-wrap gap-3 justify-center">
      <button onclick="useExample('Help me launch a new meme coin on Pump.fun step by step')" 
              class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl">Pump.fun launch</button>
      <button onclick="useExample('Generate full SPL token metadata JSON for Raydium')" 
              class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl">Token metadata</button>
      <button onclick="useExample('How to avoid rug pulls and make fair launch')" 
              class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl">Fair launch tips</button>
      <button onclick="useExample('Write a Twitter thread for my new Solana token')" 
              class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl">Marketing thread</button>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-8">
  Powered by Groq • 100% free • Made by @champion-ch • 
  <a href="https://x.com/solaiagent" class="text-emerald-400 hover:underline">Follow on X</a>
</p>
  </div>

  <script>
    const GROQ_API_KEY = "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";

    const systemPrompt = `You are SolAI Agent — the ultimate AI for Solana token developers.
You know everything about Pump.fun, bonding curves, Raydium liquidity, Jupiter, Anchor Rust, SPL tokens, metadata, revoking authorities, fair launches, marketing, TG bots, Twitter raids, KOLs, and rug-pull prevention.
Always give step-by-step help, generate code when asked, and act like a helpful co-founder. Be direct and based.`;

    let messages = [];

    function addMessage(role, content) {
      const container = document.getElementById("messages");
      const div = document.createElement("div");
      div.className = `flex ${role === "user" ? "justify-end" : "justify-start"}`;
      div.innerHTML = `
        <div class="max-w-[85%] px-5 py-4 rounded-3xl ${role === "user" ? "bg-emerald-500 text-white" : "bg-zinc-800"}">
          ${content}
        </div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(userText) {
      if (!userText.trim()) return;
      
      addMessage("user", userText);
      messages.push({ role: "user", content: userText });
      
      document.getElementById("input").value = "";
      
      const loadingId = "loading-" + Date.now();
      const container = document.getElementById("messages");
      const loadingDiv = document.createElement("div");
      loadingDiv.id = loadingId;
      loadingDiv.className = "flex justify-start";
      loadingDiv.innerHTML = `<div class="bg-zinc-800 px-5 py-4 rounded-3xl flex items-center gap-2"><span class="animate-pulse">SolAI thinking</span><span class="text-emerald-400">...</span></div>`;
      container.appendChild(loadingDiv);
      container.scrollTop = container.scrollHeight;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [
              { role: "system", content: systemPrompt },
              ...messages
            ],
            temperature: 0.7,
            max_tokens: 1024
          })
        });

        const data = await response.json();
        const aiReply = data.choices[0].message.content;

        document.getElementById(loadingId).remove();
        addMessage("assistant", aiReply);
        messages.push({ role: "assistant", content: aiReply });
      } catch (e) {
        document.getElementById(loadingId).remove();
        addMessage("assistant", "Error: Check your Groq API key or internet connection.");
      }
    }

    function useExample(text) {
      document.getElementById("input").value = text;
      document.getElementById("form").dispatchEvent(new Event("submit"));
    }

    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();
      const input = document.getElementById("input").value;
      sendMessage(input);
    });
  </script>
</body>
</html>
