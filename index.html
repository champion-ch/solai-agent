<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolAI Agent • Free for Solana Devs</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .message { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen transition-colors duration-300">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-bold tracking-tight">SolAI Agent</h1>
        <p class="text-emerald-400 text-xl">Your free AI co-founder for Solana tokens</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleTheme()" id="theme-toggle"
                class="px-5 py-2.5 bg-zinc-900 hover:bg-zinc-800 rounded-2xl flex items-center gap-2 text-sm font-medium transition">
          <span id="theme-icon">☀️</span>
          <span id="theme-text">Light</span>
        </button>
        <button onclick="clearChat()" 
                class="px-5 py-2.5 bg-zinc-900 hover:bg-red-500/10 hover:text-red-400 rounded-2xl flex items-center gap-2 text-sm font-medium transition">
          🗑️ Clear Chat
        </button>
      </div>
    </div>

    <!-- Chat -->
    <div id="chat" class="bg-zinc-900 border border-zinc-800 rounded-3xl h-[560px] flex flex-col overflow-hidden shadow-2xl transition-colors">
      <div class="bg-zinc-950 px-6 py-4 border-b border-zinc-800 flex items-center gap-3">
        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
        <p class="font-medium">SolAI is online • Ready to build your next token</p>
      </div>

      <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-6"></div>

      <div class="p-5 border-t border-zinc-800">
        <form id="form" class="flex gap-3">
          <input id="input" type="text" 
                 class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-emerald-400 rounded-3xl px-6 py-4 text-white placeholder-zinc-400 focus:outline-none"
                 placeholder="Ask anything about your Solana token...">
          <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-3xl font-medium transition">Send</button>
        </form>
      </div>
    </div>

    <!-- Quick Start Cards -->
    <div class="mt-8">
      <p class="text-zinc-400 text-sm mb-4 font-medium">Quick start — tap any card</p>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="usePrompt('Give me a complete step-by-step guide to launch a new meme coin on Pump.fun right now')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">🚀</div>
          <p class="font-semibold">Pump.fun Launch Guide</p>
          <p class="text-xs text-zinc-400 mt-1">Full checklist + timing tips</p>
        </button>
        <button onclick="usePrompt('Generate full SPL token metadata JSON ready for Raydium')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">📄</div>
          <p class="font-semibold">Token Metadata JSON</p>
          <p class="text-xs text-zinc-400 mt-1">Copy-paste ready</p>
        </button>
        <!-- Add the other 4 cards similarly if you want, or keep the previous ones -->
      </div>
    </div>

    <p class="text-center text-xs text-zinc-500 mt-10">
      Powered by Groq • 100% free • Made by @champion-ch
    </p>
  </div>

  <script>
    const GROQ_API_KEY = "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";  // ← Replace with your real key

    const systemPrompt = `You are SolAI Agent...`; // Keep your full system prompt here (same as before)

    let messages = [];

    function loadChat() {
      const saved = localStorage.getItem("solaiChat");
      if (saved) messages = JSON.parse(saved);
      else messages = [{role: "assistant", content: "Hey dev 👋 I'm SolAI. What are we building today?"}];
      renderMessages();
    }

    function saveChat() { localStorage.setItem("solaiChat", JSON.stringify(messages)); }

    function renderMessages() {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach(m => {
        const div = document.createElement("div");
        div.className = `flex ${m.role === "user" ? "justify-end" : "justify-start"} message`;
        div.innerHTML = m.role === "user" 
          ? `<div class="max-w-[85%] bg-emerald-500 px-5 py-4 rounded-3xl">${m.content}</div>`
          : `<div class="max-w-[85%] bg-zinc-800 px-5 py-4 rounded-3xl">${m.content}</div>`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    // ... (keep the rest of the sendMessage, usePrompt, copyMessage, clearChat functions from the previous code)

    function toggleTheme() {
      document.documentElement.classList.toggle("dark");
      const isDark = document.documentElement.classList.contains("dark");
      document.getElementById("theme-icon").textContent = isDark ? "☀️" : "🌙";
      document.getElementById("theme-text").textContent = isDark ? "Light" : "Dark";
    }

    // Form and init (same as before)
    document.getElementById("form").addEventListener("submit", e => {
      e.preventDefault();
      const input = document.getElementById("input").value.trim();
      if (input) sendMessage(input);
    });

    document.addEventListener("DOMContentLoaded", loadChat);
  </script>
</body>
</html>
