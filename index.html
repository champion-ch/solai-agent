<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolAI Agent • Free for Solana Devs</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .message { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <div>
        <h1 class="text-5xl font-bold tracking-tight">SolAI Agent</h1>
        <p class="text-emerald-400 text-xl">Your free AI co-founder for Solana tokens</p>
      </div>
      <button onclick="clearChat()" 
              class="px-5 py-2 bg-zinc-900 hover:bg-red-500/10 hover:text-red-400 rounded-2xl flex items-center gap-2 text-sm font-medium">
        🗑️ Clear Chat
      </button>
    </div>

    <!-- Chat Container -->
    <div id="chat" class="bg-zinc-900 border border-zinc-800 rounded-3xl h-[560px] flex flex-col overflow-hidden shadow-2xl">
      <div class="bg-zinc-950 px-6 py-4 border-b border-zinc-800 flex items-center gap-3">
        <div class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></div>
        <p class="font-medium">SolAI is online • Ready to build your next token</p>
      </div>

      <div id="messages" class="flex-1 p-6 overflow-y-auto space-y-6"></div>

      <div class="p-5 border-t border-zinc-800">
        <form id="form" class="flex gap-3">
          <input id="input" type="text" 
                 class="flex-1 bg-zinc-800 border border-zinc-700 focus:border-emerald-400 rounded-3xl px-6 py-4 text-white placeholder-zinc-400 focus:outline-none"
                 placeholder="Ask anything about your Solana token...">
          <button type="submit" 
                  class="bg-emerald-500 hover:bg-emerald-600 px-8 rounded-3xl font-medium">Send</button>
        </form>
      </div>
    </div>

    <!-- Quick Start Cards - All 6 -->
    <div class="mt-8">
      <p class="text-zinc-400 text-sm mb-4 font-medium">Quick start — tap any card</p>
      <div class="grid grid-cols-2 gap-3">
        <button onclick="usePrompt('Give me a complete step-by-step guide to launch a new meme coin on Pump.fun right now')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">🚀</div>
          <p class="font-semibold">Pump.fun Launch Guide</p>
          <p class="text-xs text-zinc-400 mt-1">Full checklist + timing tips</p>
        </button>

        <button onclick="usePrompt('Generate full SPL token metadata JSON ready for Raydium')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">📄</div>
          <p class="font-semibold">Token Metadata JSON</p>
          <p class="text-xs text-zinc-400 mt-1">Copy-paste ready</p>
        </button>

        <button onclick="usePrompt('How to make a fair launch on Solana and avoid rug pull accusations')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">🛡️</div>
          <p class="font-semibold">Fair Launch Tips</p>
          <p class="text-xs text-zinc-400 mt-1">Best practices</p>
        </button>

        <button onclick="usePrompt('Write a viral Twitter thread for my new Solana meme coin')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">🐦</div>
          <p class="font-semibold">Marketing Twitter Thread</p>
          <p class="text-xs text-zinc-400 mt-1">Ready to post</p>
        </button>

        <button onclick="usePrompt('Help me revoke mint & freeze authority on my SPL token')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">🔓</div>
          <p class="font-semibold">Revoke Authorities</p>
          <p class="text-xs text-zinc-400 mt-1">Security checklist</p>
        </button>

        <button onclick="usePrompt('Brainstorm 5 strong meme coin concepts with narrative for Solana')" 
                class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-700 hover:border-emerald-400 rounded-3xl p-5 text-left transition-all">
          <div class="text-emerald-400 text-2xl mb-2">💡</div>
          <p class="font-semibold">Brainstorm Coin Ideas</p>
          <p class="text-xs text-zinc-400 mt-1">With strong narrative</p>
        </button>
      </div>
    </div>

        <p class="text-center text-xs text-zinc-500 mt-10">
      Powered by Groq • 100% free • Made by @champion-ch • 
      <a href="https://x.com/solaiagent" target="_blank" class="text-emerald-400 hover:underline">Follow on X</a>
    </p>
  </div>

  <script>
    const GROQ_API_KEY = "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";   // ← Replace with your real Groq key here

    const systemPrompt = `You are SolAI Agent — the ultimate AI for Solana token developers.
You know everything about Pump.fun, bonding curves, Raydium liquidity, Jupiter, Anchor Rust, SPL tokens, metadata, revoking authorities, fair launches, marketing, TG bots, Twitter raids, KOLs, and rug-pull prevention.
Always give step-by-step help, generate code when asked, and act like a helpful co-founder. Be direct and based.`;

    let messages = [];

    function loadChat() {
      const saved = localStorage.getItem("solaiChat");
      if (saved) {
        messages = JSON.parse(saved);
      } else {
        messages = [{ role: "assistant", content: "Hey dev 👋 I'm SolAI — your free AI co-founder for Solana tokens.\n\nWhat are we building today? Try the quick cards above or just ask anything." }];
      }
      renderMessages();
    }

    function saveChat() {
      localStorage.setItem("solaiChat", JSON.stringify(messages));
    }

    function renderMessages() {
      const container = document.getElementById("messages");
      container.innerHTML = "";
      messages.forEach((m) => {
        const div = document.createElement("div");
        div.className = `flex ${m.role === "user" ? "justify-end" : "justify-start"} message`;
        if (m.role === "assistant") {
          div.innerHTML = `<div class="max-w-[85%] bg-zinc-800 px-5 py-4 rounded-3xl">${m.content.replace(/\n/g, '<br>')}</div>`;
        } else {
          div.innerHTML = `<div class="max-w-[85%] bg-emerald-500 px-5 py-4 rounded-3xl">${m.content}</div>`;
        }
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage(userText) {
      if (!userText.trim()) return;

      messages.push({ role: "user", content: userText });
      renderMessages();
      document.getElementById("input").value = "";

      const container = document.getElementById("messages");
      const loadingId = "loading-" + Date.now();
      const loadingDiv = document.createElement("div");
      loadingDiv.id = loadingId;
      loadingDiv.className = "flex justify-start";
      loadingDiv.innerHTML = `<div class="bg-zinc-800 px-5 py-4 rounded-3xl flex items-center gap-2"><span class="animate-pulse">SolAI thinking</span><span class="text-emerald-400">...</span></div>`;
      container.appendChild(loadingDiv);
      container.scrollTop = container.scrollHeight;

      try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${GROQ_API_KEY}`
          },
          body: JSON.stringify({
            model: "llama-3.3-70b-versatile",
            messages: [{ role: "system", content: systemPrompt }, ...messages],
            temperature: 0.7,
            max_tokens: 1200
          })
        });

        const data = await response.json();
        const aiReply = data.choices[0].message.content;

        document.getElementById(loadingId).remove();
        messages.push({ role: "assistant", content: aiReply });
        renderMessages();
        saveChat();
      } catch (e) {
        document.getElementById(loadingId).remove();
        messages.push({ role: "assistant", content: "Error connecting to Groq. Check your API key or internet connection." });
        renderMessages();
      }
    }

    function usePrompt(text) {
      document.getElementById("input").value = text;
      sendMessage(text);
    }

    function clearChat() {
      if (confirm("Clear all chat history?")) {
        localStorage.removeItem("solaiChat");
        messages = [];
        loadChat();
      }
    }

    document.getElementById("form").addEventListener("submit", function(e) {
      e.preventDefault();
      const input = document.getElementById("input").value.trim();
      if (input) sendMessage(input);
    });

    // Initialize
    document.addEventListener("DOMContentLoaded", () => {
      loadChat();
    });
  </script>
</body>
</html>
